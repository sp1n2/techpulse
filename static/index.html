<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>TechPulse</title>
<meta name="description" content="AI-first tech news briefing tool powered by Claude"/>
<meta name="theme-color" content="#6366f1"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="TechPulse"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/static/icon-180.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:      #0a0e1a;
  --bg1:     #0e1220;
  --bg2:     #141824;
  --bg3:     #1e2337;
  --bg4:     #252d47;
  --border:  #2a3050;
  --border2: #1e2540;
  --acc:     #6366f1;
  --acc2:    #818cf8;
  --acc3:    #4f46e5;
  --text:    #f1f5f9;
  --text2:   #94a3b8;
  --text3:   #64748b;
  --danger:  #ef4444;
  --warn:    #f59e0b;
  --ok:      #10b981;
  --hdr:     56px;
  --pw:      430px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;height:100vh;overflow:hidden}

/* Header */
.hdr{height:var(--hdr);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:10}
.tab-nav{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:3px;flex:1;max-width:280px}
.tab-btn{flex:1;padding:5px 10px;border:none;border-radius:7px;background:transparent;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;font-family:inherit}
.tab-btn.active{background:var(--acc);color:#fff}
.hdr-tools{margin-left:auto;display:flex;gap:6px}
.tool-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;font-weight:600;padding:5px 10px;cursor:pointer;transition:all .2s;font-family:inherit}
.tool-btn:hover{border-color:var(--acc);color:var(--acc2)}

/* Layout */
#app{height:100vh;display:flex;flex-direction:column}
#main{flex:1;position:relative;overflow:hidden}
.tab-pane{position:absolute;inset:0;display:flex;flex-direction:column;opacity:1;transition:opacity .2s}
.tab-pane.hidden{opacity:0;pointer-events:none}

/* Chat tab */
.chat-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
#chat-msgs{flex:1;overflow-y:auto;padding:22px 18px 12px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}
#chat-msgs::-webkit-scrollbar{width:4px}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.chat-bar{padding:10px 14px;border-top:1px solid var(--border);background:var(--bg2);display:flex;gap:8px;align-items:center}
#chat-in{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:14px;padding:9px 13px;outline:none;transition:border-color .2s}
#chat-in:focus{border-color:var(--acc)}
#chat-in::placeholder{color:var(--text3)}
#btn-send{width:38px;height:38px;background:var(--acc);border:none;border-radius:9px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
#btn-send:hover{background:var(--acc3)}

/* Bubbles */
.brow{display:flex;flex-direction:column;gap:4px}
.brow.user{align-items:flex-end}
.brow.ai{align-items:flex-start;max-width:93%}
.brow-inner{display:flex;align-items:flex-end;gap:10px}
.bubble{padding:11px 15px;border-radius:16px;font-size:14px;line-height:1.65;max-width:100%}
.bubble.user{background:var(--acc);color:#fff;border-bottom-right-radius:4px;align-self:flex-end;max-width:78%}
.bubble.ai{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px}
.bubble.ai p{margin:0 0 5px}
.bubble.ai p:last-child{margin-bottom:0}
.bubble.ai ul,.bubble.ai ol{margin:5px 0 5px 17px}
.bubble.ai li{margin-bottom:3px}
.bubble.ai strong{color:var(--text)}
.bubble.ai code{background:var(--bg);padding:1px 5px;border-radius:4px;font-size:12px;font-family:monospace}

/* Typing dots */
.dots{display:flex;gap:4px;align-items:center;padding:2px 0}
.dots span{width:7px;height:7px;background:var(--text3);border-radius:50%;animation:dpulse 1.3s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes dpulse{0%,70%,100%{transform:scale(.7);opacity:.4}35%{transform:scale(1.1);opacity:1}}
.cursor{display:inline-block;width:2px;height:.85em;background:var(--acc2);vertical-align:middle;margin-left:1px;animation:cblink .85s step-end infinite}
@keyframes cblink{0%,100%{opacity:1}50%{opacity:0}}

/* Presets */
.preset-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;align-self:flex-start;max-width:380px;width:100%}
.preset-btn{padding:11px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:13px;font-family:inherit;cursor:pointer;text-align:left;transition:all .18s;line-height:1.3}
.preset-btn:hover{border-color:var(--acc);color:var(--acc2);background:rgba(99,102,241,.08);transform:translateY(-1px)}

/* New chat btn */
#btn-new{background:none;border:1px solid var(--border);border-radius:7px;color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer;padding:3px 9px;margin-bottom:4px;align-self:flex-start;transition:all .2s}
#btn-new:hover{color:var(--text2);border-color:var(--text3)}
#btn-new.hidden{display:none}

/* Sources */
.src-wrap{margin-top:5px}
.src-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:12px;font-family:inherit;cursor:pointer;padding:3px 10px;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.src-btn:hover{border-color:var(--acc);color:var(--acc2)}
.src-btn::after{content:'▾';font-size:10px}
.src-wrap.open .src-btn::after{content:'▴'}
.src-list{display:none;margin-top:6px;flex-direction:column;gap:4px}
.src-wrap.open .src-list{display:flex}
.src-item{display:flex;flex-direction:column;gap:1px;padding:7px 10px;background:var(--bg);border:1px solid var(--border2);border-radius:8px;text-decoration:none;transition:border-color .2s}
.src-item:hover{border-color:var(--acc)}
.src-item-from{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.src-item-title{font-size:12px;color:var(--text2)}
.err-msg{color:var(--danger)}

/* News tab */
.filter-bar{padding:9px 14px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.f-btn{padding:4px 13px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:12px;font-family:inherit;font-weight:500;cursor:pointer;transition:all .2s}
.f-btn:hover{border-color:var(--acc);color:var(--acc2)}
.f-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
#news-grid{flex:1;overflow-y:auto;padding:12px 14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px;align-content:start}
#news-grid::-webkit-scrollbar{width:4px}
#news-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Cards */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:13px;cursor:pointer;transition:border-color .2s,transform .2s,box-shadow .2s;animation:cin .28s ease-out both;display:flex;flex-direction:column;gap:8px}
.card:hover{border-color:rgba(99,102,241,.45);transform:translateY(-2px);box-shadow:0 6px 24px rgba(99,102,241,.11)}
.card.alert{border-left:3px solid var(--danger)}
@keyframes cin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-top{display:flex;align-items:center;gap:6px}
.src-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.src-nm{font-size:11px;color:var(--text3);font-weight:500}
.card-time{font-size:11px;color:var(--text3);margin-left:auto}
.card-title{font-size:13px;font-weight:600;line-height:1.4;color:var(--text);display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden}
.card-bot{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.cat-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:.04em}
.alert-tag{font-size:10px;font-weight:600;color:var(--danger);background:rgba(239,68,68,.1);padding:2px 7px;border-radius:4px}
.card-metric{font-size:11px;color:var(--text3);margin-left:auto}
.empty{color:var(--text3);font-size:14px;text-align:center;padding:40px 20px;grid-column:1/-1}

/* Side panel */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
#overlay.vis{opacity:1;pointer-events:auto}
#panel{position:fixed;top:0;right:0;width:var(--pw);max-width:100vw;height:100vh;background:var(--bg2);border-left:1px solid var(--border);z-index:51;transform:translateX(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,.4)}
#panel.vis{transform:translateX(0)}
.panel-hd{display:flex;align-items:center;padding:12px 14px;border-bottom:1px solid var(--border);gap:10px}
#panel-close{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);width:30px;height:30px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
#panel-close:hover{color:var(--text);border-color:var(--text3)}
.panel-src-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;background:rgba(99,102,241,.12);color:var(--acc2);border:1px solid rgba(99,102,241,.25)}
.panel-body{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
.panel-title{font-size:16px;font-weight:700;line-height:1.4;color:var(--text)}
.panel-meta{font-size:12px;color:var(--text3)}
.panel-acts{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.pbtn{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 14px;border-radius:10px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .2s;text-decoration:none;text-align:center}
.pbtn-sec{background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.pbtn-sec:hover{border-color:var(--acc);color:var(--acc2)}
.pbtn-pri{background:var(--acc);border:none;color:#fff}
.pbtn-pri:hover{background:var(--acc3)}

/* Modals */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
.modal.hidden{display:none}
.mbox{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:26px;width:100%;max-width:420px;display:flex;flex-direction:column;gap:15px;box-shadow:0 24px 48px rgba(0,0,0,.5);animation:min .2s ease-out}
@keyframes min{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
.mlogo{font-size:26px}
.mtitle{font-size:20px;font-weight:700;color:var(--text)}
.mdesc{font-size:14px;color:var(--text2);line-height:1.6}
.mlabel{font-size:13px;font-weight:500;color:var(--text2);display:block;margin-bottom:6px}
.minput{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;outline:none;transition:border-color .2s}
.minput:focus{border-color:var(--acc)}
.minput::placeholder{color:var(--text3)}
.mhint{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mhint a{color:var(--acc2);text-decoration:none}
.mhint a:hover{text-decoration:underline}
.mbtns{display:flex;gap:8px}
.btn-pri{flex:1;background:var(--acc);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;font-family:inherit;padding:11px 16px;cursor:pointer;transition:background .2s}
.btn-pri:hover{background:var(--acc3)}
.btn-ghost{background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:14px;font-family:inherit;padding:11px 16px;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:var(--text3);color:var(--text)}

/* Toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(6px);background:var(--bg3);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;padding:9px 17px;opacity:0;transition:all .28s;pointer-events:none;z-index:200;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Logo ── */
.brand{display:flex;align-items:center;gap:8px;font-size:16px;font-weight:800;user-select:none;flex-shrink:0;cursor:pointer;background:none;border:none;color:inherit;font-family:inherit;padding:0;letter-spacing:-.02em}
.brand:hover .logo-pulse{opacity:.75}
.logo-tech{color:#f1f5f9}
.logo-pulse{color:#6366f1;transition:opacity .2s}
.logo-ekg{overflow:visible;flex-shrink:0}

/* ── About page ── */
#about-page{position:fixed;inset:0;background:var(--bg);z-index:90;overflow-y:auto;-webkit-overflow-scrolling:touch}
#about-page.hidden{display:none}
.about-close{position:fixed;top:14px;right:16px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text2);width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;z-index:92;transition:all .2s}
.about-close:hover{color:var(--text);border-color:var(--text3)}
.about-scroll{padding:56px 22px 90px;max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:64px}
.about-section{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
.about-section.vis{opacity:1;transform:translateY(0)}
.about-hero{display:flex;flex-direction:column;align-items:center;text-align:center;gap:22px;padding-top:28px}
.about-hero-logo{display:flex;align-items:center;gap:10px;font-size:24px;font-weight:800;letter-spacing:-.02em}
.about-hero-logo .logo-pulse{color:#6366f1}
.about-hero h1{font-size:clamp(26px,5vw,42px);font-weight:800;line-height:1.15;letter-spacing:-.025em}
.about-hero h1 em{font-style:normal;color:var(--acc)}
.about-hero p{font-size:15px;color:var(--text2);max-width:440px;line-height:1.8}
.about-feats{display:flex;flex-direction:column;gap:14px}
.about-feat-row{display:flex;gap:16px;align-items:flex-start;padding:18px 20px;background:var(--bg2);border:1px solid var(--border);border-radius:14px;transition:border-color .2s}
.about-feat-row:hover{border-color:rgba(99,102,241,.4)}
.about-feat-icon{font-size:24px;flex-shrink:0;margin-top:2px}
.about-feat-row h3{font-size:15px;font-weight:700;margin-bottom:5px;color:var(--text)}
.about-feat-row p{font-size:13px;color:var(--text2);line-height:1.75}
.about-cta{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.about-cta p{font-size:14px;color:var(--text3)}
#btn-about-start{background:var(--acc);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;font-family:inherit;padding:13px 38px;cursor:pointer;transition:background .2s,transform .2s,box-shadow .2s;box-shadow:0 4px 22px rgba(99,102,241,.32)}
#btn-about-start:hover{background:var(--acc3);transform:translateY(-1px);box-shadow:0 8px 28px rgba(99,102,241,.48)}

/* ── AI Banner ── */
#ai-banner{margin:10px 14px 0;padding:11px 16px;background:linear-gradient(100deg,#4f46e5 0%,#7c3aed 100%);border-radius:10px;color:#fff;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:0 0 22px rgba(99,102,241,.35),inset 0 1px 0 rgba(255,255,255,.1);transition:box-shadow .2s,transform .15s;flex-shrink:0}
#ai-banner:hover{box-shadow:0 0 34px rgba(99,102,241,.6),inset 0 1px 0 rgba(255,255,255,.1);transform:translateY(-1px)}
.bn-arr{font-size:15px;font-weight:700;opacity:.75;flex-shrink:0}

/* ── Robot ── */
.robot-inline{flex-shrink:0;display:flex;flex-direction:column;align-items:center;opacity:.4;transition:opacity .4s ease,transform .35s ease}
.robot-inline.active{opacity:1;transform:translateY(-4px)}
.robot-body{width:54px;height:46px;background:linear-gradient(155deg,#eef1ff,#dce3f8);border-radius:13px;position:relative;border:2px solid #b8c4e8;box-shadow:0 0 18px rgba(99,102,241,.25)}
.robot-antenna{position:absolute;top:-16px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center}
.robot-ball{width:9px;height:9px;background:#6366f1;border-radius:50%;box-shadow:0 0 10px #6366f1;animation:rball 2.2s ease-in-out infinite}
@keyframes rball{0%,100%{opacity:1;box-shadow:0 0 10px #6366f1}50%{opacity:.3;box-shadow:0 0 3px #6366f1}}
.robot-stem{width:2px;height:8px;background:#b8c4e8}
.robot-face{position:absolute;inset:6px 6px 10px;background:#0a0e1a;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.robot-eyes{display:flex;gap:10px}
.robot-eye{width:9px;height:9px;background:#6366f1;border-radius:50%;box-shadow:0 0 8px #6366f1;animation:reye 4s ease-in-out infinite}
.robot-eye:nth-child(2){animation-delay:.1s}
@keyframes reye{0%,86%,100%{transform:scaleY(1)}90%,95%{transform:scaleY(.07)}}
.robot-mouth{width:16px;height:3px;background:#10b981;border-radius:2px}
.robot-inline.active .robot-mouth{animation:rmouth .22s ease-in-out infinite alternate}
@keyframes rmouth{from{height:3px;background:#10b981}to{height:8px;border-radius:4px;background:#34d399}}
.robot-feet{display:flex;gap:11px;margin-top:2px}
.robot-foot{width:15px;height:6px;background:#c8d0e8;border-radius:0 0 6px 6px}

/* ── iOS safe areas ── */
.hdr{padding-top:env(safe-area-inset-top,0px);height:calc(var(--hdr) + env(safe-area-inset-top,0px))}
.chat-bar{padding-bottom:calc(10px + env(safe-area-inset-bottom,0px))}
#panel{padding-top:env(safe-area-inset-top,0px)}

/* ── Mobile responsive ── */
@media(max-width:600px){
  #panel{width:100%}
  .preset-grid{grid-template-columns:1fr}
  .tab-nav{max-width:220px}
}
@media(max-width:430px){
  .hdr{padding-left:max(10px,env(safe-area-inset-left,10px));padding-right:max(10px,env(safe-area-inset-right,10px));gap:6px}
  .logo-tech,.logo-pulse{font-size:14px}
  .logo-ekg{width:22px;height:14px}
  .tab-nav{max-width:195px}
  .tab-btn{font-size:12px;padding:4px 8px}
  .tool-btn{padding:5px 8px;font-size:11px}
  #chat-in{font-size:16px}
  .f-btn{padding:4px 9px;font-size:11px}
  .filter-bar{gap:4px;padding:7px 10px}
  #news-grid{padding:10px}
  #ai-banner{margin:8px 10px 0;padding:10px 13px;font-size:12px}
  .preset-btn{font-size:12px;padding:10px 11px}
  .bubble{font-size:13px}
}
</style>
</head>
<body>

<!-- About page overlay -->
<div id="about-page" class="hidden">
  <button class="about-close" id="btn-about-close">✕</button>
  <div class="about-scroll">
    <section class="about-section about-hero">
      <div class="about-hero-logo">
        <svg viewBox="0 0 28 18" width="34" height="22" fill="none">
          <polyline points="0,9 5,9 8,2 11,16 14,9 28,9" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span><span class="logo-tech">Tech</span><span class="logo-pulse">Pulse</span></span>
      </div>
      <h1 id="ab-h1"></h1>
      <p id="ab-p1"></p>
    </section>
    <section class="about-section about-feats">
      <div class="about-feat-row">
        <span class="about-feat-icon">⚡</span>
        <div><h3 id="ab-f1h"></h3><p id="ab-f1p"></p></div>
      </div>
      <div class="about-feat-row">
        <span class="about-feat-icon">🤖</span>
        <div><h3 id="ab-f2h"></h3><p id="ab-f2p"></p></div>
      </div>

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function timeAgo(ts){
  const s = Math.floor(Date.now()/1000) - ts;
  if(s < 60) return s+'s';
  if(s < 3600) return Math.floor(s/60)+'m';
  if(s < 86400) return Math.floor(s/3600)+'h';
  return Math.floor(s/86400)+'d';
}

function mdToHtml(text){
  if(!text) return '';
  const lines = text.split('\n');
  const out = [];
  let lt = '';
  const bold = s => s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>');
  const close = () => { if(lt){ out.push('</'+lt+'>'); lt=''; } };
  for(const raw of lines){
    const line = raw.trimEnd();
    if(!line.trim()){ close(); continue; }
    if(/^[•\-\*]\s/.test(line)){
      if(lt!=='ul'){ close(); out.push('<ul>'); lt='ul'; }
      out.push('<li>'+bold(esc(line.replace(/^[•\-\*]\s/,'')))+'</li>');
    } else if(/^\d+\.\s/.test(line)){
      if(lt!=='ol'){ close(); out.push('<ol>'); lt='ol'; }
      out.push('<li>'+bold(esc(line.replace(/^\d+\.\s/,'')))+'</li>');
    } else {
      close();
      out.push('<p>'+bold(esc(line.trim()))+'</p>');
    }
  }
  close();
  return out.join('');
}

// ═══════════════════════════════════════════════════════════════
// Typewriter
// ═══════════════════════════════════════════════════════════════
const TW={
  q:'', disp:'', bub:null, rob:null, _t:null, _cb:null,
  start(bub,rob){ if(this._t){clearTimeout(this._t);this._t=null;} this.q='';this.disp='';this.bub=bub;this.rob=rob;this._cb=null; setRobotTalking(false,rob); },
  add(chunk){ this.q+=chunk; if(!this._t) this._go(); },
  _go(){
    if(!this.q.length){ this._t=null; setRobotTalking(false,this.rob); if(this._cb){const f=this._cb;this._cb=null;f(this.disp);} return; }
    const n=Math.min(4,this.q.length);
    this.disp+=this.q.slice(0,n); this.q=this.q.slice(n);
    if(this.bub){ this.bub.innerHTML=mdToHtml(this.disp)+'<span class="cursor"></span>'; scrollBot(); }
    setRobotTalking(true,this.rob);
    this._t=setTimeout(()=>this._go(),14);
  },
  finish(full,cb){
    if(this.q.length>300){ if(this._t){clearTimeout(this._t);this._t=null;} this.disp=full;this.q=''; if(this.bub) this.bub.innerHTML=mdToHtml(full); setRobotTalking(false,this.rob); cb&&cb(full); return; }
    this._cb=cb; if(!this._t) this._go();
  },
  abort(){ if(this._t){clearTimeout(this._t);this._t=null;} this.q=''; setRobotTalking(false,this.rob); }
};

// ═══════════════════════════════════════════════════════════════
// Streaming
// ═══════════════════════════════════════════════════════════════
let streamCtrl = null;

async function callStream(messages, system, onChunk, onDone, onErr){
  if(streamCtrl){ streamCtrl.abort(); }
  streamCtrl = new AbortController();
  if(!S.apiKey){ onErr(t('errNoKey')); showWelcome(); return; }
  try{
    const res = await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-API-Key':S.apiKey},
      body:JSON.stringify({messages,system,max_tokens:1500}),
      signal:streamCtrl.signal,
    });
    if(res.status===401){ onErr(t('errNoKey')); showWelcome(); return; }
    if(!res.ok){ onErr('HTTP '+res.status); return; }
    const reader=res.body.getReader(), dec=new TextDecoder();
    let buf='', full='';
    while(true){
      const {done,value}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      const parts=buf.split('\n'); buf=parts.pop()??'';
      for(const line of parts){
        if(!line.startsWith('data: ')) continue;
        const raw=line.slice(6).trim();
        if(raw==='[DONE]'){ onDone(full); return; }
        try{
          const obj=JSON.parse(raw);
          if(obj.error){ onErr(obj.error); return; }
          if(obj.text){ full+=obj.text; onChunk(obj.text,full); }
        }catch{}
      }
    }
    onDone(full);
  }catch(e){
    if(e.name!=='AbortError') onErr(e.message);
  }finally{ streamCtrl=null; }
}

async function handlePreset(idx){

  S.chatSources = arts.slice(0,15);
  const topic = S.lang==='tr' ? trStr : en;
  S.chatSystem = sysNews(topic, S.chatSources);
  S.chatHistory = [{role:'user',content:label}];
  const {row,bub,rob}=appendTyping();
  TW.start(bub,rob);
  await callStream(S.chatHistory, S.chatSystem,
    (chunk)=>{ TW.add(chunk); },
    (full)=>{ TW.finish(full,()=>{ bub.innerHTML=mdToHtml(full); S.chatHistory.push({role:'assistant',content:full}); addSources(row,S.chatSources.slice(0,8)); scrollBot(); showNewBtn(); }); },
    (err)=>{ TW.abort(); bub.innerHTML='<span class="err-msg">⚠ '+esc(err)+'</span>'; }
  );
}

async function handleInput(){
  const inp=document.getElementById('chat-in');
  const text=inp.value.trim(); if(!text) return;
  if(!S.apiKey){ showWelcome(); return; }
  inp.value='';
  if(S.chatPhase==='initial'){
    S.chatPhase='active';
    document.querySelector('.preset-grid')?.remove();
    const arts=await fetchNews('all');
    S.chatSources=arts.slice(0,10);
    S.chatSystem=sysGeneral(S.chatSources);
    S.chatHistory=[];
  }
  appendUserBubble(text);
  S.chatHistory.push({role:'user',content:text});
  const {row,bub,rob}=appendTyping();
  TW.start(bub,rob);
  await callStream(S.chatHistory, S.chatSystem,
    (chunk)=>{ TW.add(chunk); },
    (full)=>{ TW.finish(full,()=>{ bub.innerHTML=mdToHtml(full); S.chatHistory.push({role:'assistant',content:full}); if(S.chatSources.length) addSources(row,S.chatSources.slice(0,5)); scrollBot(); showNewBtn(); }); },
    (err)=>{ TW.abort(); bub.innerHTML='<span class="err-msg">⚠ '+esc(err)+'</span>'; }
  );
}

async function askAIAbout(art){
  closePanel();
  switchTab('ai');
  if(streamCtrl){ streamCtrl.abort(); streamCtrl=null; }
  S.chatPhase='active'; S.chatSources=[art];
  S.chatSystem=sysArticle(art); S.chatHistory=[];
  const msgs=document.getElementById('chat-msgs');
  msgs.innerHTML='';
  const nb=document.getElementById('btn-new'); if(nb) nb.classList.add('hidden');
  appendAIBubble('<strong>📰 '+t('discussing')+':</strong> '+esc(art.title), true);
  const userMsg = S.lang==='tr'
    ? '"'+art.title+'" makalesini özetle ve önemli noktaları açıkla.'
    : 'Summarize and explain the key points of: "'+art.title+'"';
  appendUserBubble(userMsg);
  S.chatHistory.push({role:'user',content:userMsg});
  const {row,bub,rob}=appendTyping();
  TW.start(bub,rob);
  await callStream(S.chatHistory, S.chatSystem,
    (chunk)=>{ TW.add(chunk); },
    (full)=>{ TW.finish(full,()=>{ bub.innerHTML=mdToHtml(full); S.chatHistory.push({role:'assistant',content:full}); addSources(row,[art]); scrollBot(); showNewBtn(); }); },
    (err)=>{ TW.abort(); bub.innerHTML='<span class="err-msg">⚠ '+esc(err)+'</span>'; }
  );
}

// ═══════════════════════════════════════════════════════════════
// News feed
// ═══════════════════════════════════════════════════════════════
function buildCard(a, idx){
  const sc=SRC_COL[a.source]||'#64748b';
  const delay=Math.min(idx*18,300);
  const badges=(a.categories||[]).slice(0,2).map(c=>{
    const m=CAT_META[c]; if(!m) return '';
    return '<span class="cat-tag" style="color:'+m.color+';background:'+m.color+'18;border:1px solid '+m.color+'30">'+c+'</span>';
  }).join('');
  const alertTag=a.is_alert?'<span class="alert-tag">'+t('alertBadge')+'</span>':'';
  const metric=a.source_type==='hn'
    ?'▲ '+a.score+' '+t('pts')
    :'⏱ '+a.read_time+' '+t('minRead');
  return '<article class="card'+(a.is_alert?' alert':'')+'" data-id="'+esc(a.id)+'" style="animation-delay:'+delay+'ms">'
    +'<div class="card-top"><span class="src-dot" style="background:'+sc+'"></span><span class="src-nm">'+esc(a.source)+'</span><span class="card-time">'+timeAgo(a.time)+'</span></div>'
    +'<h3 class="card-title">'+esc(a.title)+'</h3>'
    +'<div class="card-bot"><div style="display:flex;gap:4px;flex-wrap:wrap">'+badges+alertTag+'</div><span class="card-metric">'+metric+'</span></div>'
    +'</article>';
}

function renderNews(arts){
  const grid=document.getElementById('news-grid');
  if(!arts.length){ grid.innerHTML='<div class="empty">'+t('noNews')+'</div>'; return; }
  grid.innerHTML=arts.map((a,i)=>buildCard(a,i)).join('');
  grid.querySelectorAll('.card').forEach(card=>{
    card.onclick=()=>{ const a=S.news.find(x=>x.id===card.dataset.id); if(a) openPanel(a); };
  });
}

function applyFilter(){
  const filtered=S.newsFilter==='all'?S.news:S.news.filter(a=>a.categories?.includes(S.newsFilter));
  renderNews(filtered);
}

async function loadNews(){
  if(S.newsLoaded){ applyFilter(); return; }
  document.getElementById('news-grid').innerHTML='<div class="empty">'+t('loading')+'</div>';
  S.news=await fetchNews('all');
  S.newsLoaded=true;
  applyFilter();
}

// ═══════════════════════════════════════════════════════════════
// Side panel
// ═══════════════════════════════════════════════════════════════
function openPanel(art){
  S.panelArt=art;
  document.getElementById('panel-src').textContent=art.source;
  document.getElementById('panel-title').textContent=art.title;
  const metric=art.source_type==='hn'
    ?'▲ '+art.score+' '+t('pts')+' · '+art.descendants+' comments'
    :'⏱ '+art.read_time+' '+t('minRead');
  document.getElementById('panel-meta').textContent=timeAgo(art.time)+' ago · '+metric;
  document.getElementById('panel-open').href=art.url;
  document.getElementById('panel-open').textContent=t('openOrig');
  document.getElementById('panel-askai').textContent=t('askAI');
  document.getElementById('overlay').classList.add('vis');
  document.getElementById('panel').classList.add('vis');
  document.body.style.overflow='hidden';
}

function closePanel(){
  document.getElementById('overlay').classList.remove('vis');
  document.getElementById('panel').classList.remove('vis');
  document.body.style.overflow='';
  S.panelArt=null;
}

// ═══════════════════════════════════════════════════════════════
// Notifications
// ═══════════════════════════════════════════════════════════════
const seen=new Set(JSON.parse(localStorage.getItem('tp_seen')||'[]'));

async function initNotifs(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='default'){
    const p=await Notification.requestPermission();
    if(p==='granted') toast(t('notifsOn'));
  }
  if(Notification.permission==='granted'){
    pollAlerts(); setInterval(pollAlerts, 5*60*1000);
  }
}

async function pollAlerts(){
  const alerts=await fetchAlerts();
  let changed=false;
  for(const a of alerts){
    if(!seen.has(a.id)){
      new Notification('⚡ TechPulse Alert',{body:a.title,tag:a.id});
      seen.add(a.id); changed=true;
    }
  }
  if(changed) localStorage.setItem('tp_seen',JSON.stringify([...seen]));
}

// ═══════════════════════════════════════════════════════════════
// Modals
// ═══════════════════════════════════════════════════════════════
function showWelcome(){
  document.getElementById('modal-welcome').classList.remove('hidden');
  setTimeout(()=>document.getElementById('w-key').focus(),80);
}
function hideWelcome(){ document.getElementById('modal-welcome').classList.add('hidden'); }
function showSettings(){
  document.getElementById('modal-settings').classList.remove('hidden');
  document.getElementById('s-key').value=S.apiKey;
  setTimeout(()=>document.getElementById('s-key').focus(),80);
}
function hideSettings(){ document.getElementById('modal-settings').classList.add('hidden'); }
function saveKey(k){ S.apiKey=k.trim(); localStorage.setItem('tp_key',S.apiKey); }

// ═══════════════════════════════════════════════════════════════
// Tabs + Language
// ═══════════════════════════════════════════════════════════════
function switchTab(tab){
  if(S.tab===tab) return; S.tab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.getElementById('tab-ai').classList.toggle('hidden',tab!=='ai');
  document.getElementById('tab-news').classList.toggle('hidden',tab!=='news');
  if(tab==='news') loadNews();
}

function updateI18n(){
  document.getElementById('tab-btn-ai').textContent=t('tabAI');
  document.getElementById('tab-btn-news').textContent=t('tabNews');
  document.getElementById('chat-in').placeholder=t('placeholder');
  document.getElementById('btn-lang').textContent=S.lang==='en'?'TR':'EN';
  const fmap={all:'fAll',ai:'fAI',security:'fSec',crypto:'fCrypto',hardware:'fHW',linux:'fLinux'};
  document.querySelectorAll('.f-btn').forEach(b=>{ const k=fmap[b.dataset.cat]; if(k) b.textContent=t(k); });
  document.getElementById('w-title').textContent=t('wtitle');
  document.getElementById('w-desc').textContent=t('wdesc');
  document.getElementById('w-keylabel').textContent=t('wkeylabel');
  document.getElementById('w-hint').textContent=t('whint');
  document.getElementById('btn-wstart').textContent=t('wstart');
  document.getElementById('s-title').textContent=t('stitle');
  document.getElementById('s-keylabel').textContent=t('skeylabel');
  document.getElementById('s-hint').textContent=t('shint');
  document.getElementById('btn-ssave').textContent=t('ssave');
  document.getElementById('btn-scancel').textContent=t('scancel');
  document.getElementById('panel-open').textContent=t('openOrig');
  document.getElementById('panel-askai').textContent=t('askAI');
  // About page
  [['ab-h1','abH1',true],['ab-p1','abP1'],['ab-f1h','abF1h'],['ab-f1p','abF1p'],
   ['ab-f2h','abF2h'],['ab-f2p','abF2p'],['ab-f3h','abF3h'],['ab-f3p','abF3p'],
   ['ab-cta-p','abCtaP'],['btn-about-start','abStart']].forEach(([id,key,html])=>{
    const el=document.getElementById(id); if(!el) return;
    if(html) el.innerHTML=t(key); else el.textContent=t(key);
  });
  // AI banner
  const bn=document.getElementById('ai-banner-txt'); if(bn) bn.textContent=t('aiBanner');
  document.documentElement.lang=S.lang;
  if(S.chatPhase==='initial') renderGreeting();
}

function toggleLang(){
  S.lang=S.lang==='en'?'tr':'en';
  localStorage.setItem('tp_lang',S.lang);
  updateI18n();
}

// ═══════════════════════════════════════════════════════════════
// Wire events
// ═══════════════════════════════════════════════════════════════
function wire(){
  document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
  document.getElementById('btn-brand').onclick=showAbout;
  document.getElementById('btn-about-close').onclick=hideAbout;
  document.getElementById('btn-about-start').onclick=hideAbout;
  document.getElementById('ai-banner').onclick=()=>switchTab('ai');
  document.getElementById('btn-lang').onclick=toggleLang;
  document.getElementById('btn-settings').onclick=showSettings;
  document.getElementById('btn-send').onclick=handleInput;
  document.getElementById('chat-in').onkeydown=e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleInput();} };
  document.querySelectorAll('.f-btn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.f-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); S.newsFilter=b.dataset.cat; applyFilter();
  });
  document.getElementById('panel-close').onclick=closePanel;
  document.getElementById('overlay').onclick=closePanel;
  document.getElementById('panel-askai').onclick=()=>{ if(S.panelArt) askAIAbout(S.panelArt); };
  document.getElementById('btn-wstart').onclick=()=>{
    const k=document.getElementById('w-key').value.trim();
    if(!k) return; saveKey(k); hideWelcome(); toast('✓ API key saved');
  };
  document.getElementById('w-key').onkeydown=e=>{ if(e.key==='Enter') document.getElementById('btn-wstart').click(); };
  document.getElementById('btn-ssave').onclick=()=>{
    saveKey(document.getElementById('s-key').value.trim()); hideSettings(); toast('✓ Key updated');
  };
  document.getElementById('btn-scancel').onclick=hideSettings;
  document.getElementById('s-key').onkeydown=e=>{ if(e.key==='Enter') document.getElementById('btn-ssave').click(); };
  document.getElementById('modal-settings').onclick=e=>{ if(e.target===document.getElementById('modal-settings')) hideSettings(); };
}

// ═══════════════════════════════════════════════════════════════
// Init
// ═══════════════════════════════════════════════════════════════
function init(){
  wire();
  updateI18n();
  renderGreeting();
  if(!localStorage.getItem('tp_seen_about')) showAbout();
  initNotifs();
}

init();
</script>
